<!DOCTYPE html>
<html>
<head>
<title>Request a Quote</title>
<link rel="stylesheet" href="style.css">
<link rel="Institute" href="instutute2/Masonry (Block Laying) imeages/image1.png">
</head>
<body>

<header>
<h2>YaqAmrakabSesay Construction</h2>
</header>

<section class="section">
<h2>Request a Quote</h2>

<form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

<input type="text" name="name" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="text" name="phone" placeholder="Phone Number">

<select name="project_type" required>
<option value="">Project Type</option>
<option>Residential</option>
<option>Commercial</option>
<option>Renovation</option>
</select>

<textarea name="details" placeholder="Project Details"></textarea>

<input type="hidden" name="_subject" value="New Quotation Request">
<input type="hidden" name="_captcha" value="false">

<button type="submit">Submit Request</button>
</form>
</section>

</body>
</html>
