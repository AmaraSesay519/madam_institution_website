<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YaqAmrakabaSesay Construction company</title>
    <link rel="stylesheet" href="main2_form.css">
</head>
<body>
    <div class="boddy">
        <h2>LOGIN</h2>
        
        <div class="form-container">
            <form id="emailForm" method="post">
                <div class="input-group">
                    <label for="name">Enter your name</label>
                    <input type="text" id="name" placeholder="Name"autocomplete="off" required >
                     <label for="password">Enter your password</label>
                    <input type="password" id="password" placeholder="Password" required >
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="name@example.com"  required>
                    <span id="error-message" class="error-text">Please Enter  a valid details</span>
                </div>

                <button type="submit" id="submitBtn">
                    <a href="index.html">Submit Form</a>
                </button>
            </form>
        </div>
        
    </div>
    <!--always put js at the buttom of the page because it runs firster!-->
    <script src="/mainjavascript/main.js"></script>
    
</body>
</html>
